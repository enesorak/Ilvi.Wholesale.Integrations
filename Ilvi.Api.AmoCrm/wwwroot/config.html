<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilvi AmoCRM — Yapılandırma</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2235;
            --border: #1e293b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: border-color 0.2s;
        }

        .card:hover { border-color: rgba(99, 102, 241, 0.3); }

        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            width: 100%;
            transition: all 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-field::placeholder { color: var(--text-muted); }

        textarea.input-field {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: #5558e6; box-shadow: 0 4px 20px var(--accent-glow); }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #0d9668; }

        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-ok { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-unknown { background: rgba(100, 116, 139, 0.1); color: var(--text-muted); border: 1px solid rgba(100, 116, 139, 0.2); }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .token-display {
            word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-muted);
            max-height: 60px;
            overflow: hidden;
            transition: max-height 0.3s;
        }

        .token-display.expanded { max-height: 400px; }

        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover { color: var(--text-primary); background: var(--bg-card-hover); }
        .nav-link.active { color: var(--accent); background: var(--accent-glow); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

<!-- Navigation -->
<nav class="sticky top-0 z-50 border-b border-[var(--border)]" style="background: rgba(10, 14, 26, 0.9); backdrop-filter: blur(20px);">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-gear text-white text-sm"></i>
            </div>
            <span class="font-semibold text-sm">Ilvi AmoCRM</span>
            <span class="text-[var(--text-muted)] text-xs">/</span>
            <span class="text-[var(--text-secondary)] text-sm">Yapılandırma</span>
        </div>
        <div class="flex items-center gap-2">
            <a href="/swagger" class="nav-link"><i class="fa-solid fa-book mr-1.5"></i>API Docs</a>
            <a href="/hangfire" class="nav-link"><i class="fa-solid fa-clock mr-1.5"></i>Hangfire</a>
            <a href="/" class="nav-link"><i class="fa-solid fa-home mr-1.5"></i>Ana Sayfa</a>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8 relative z-10 space-y-6">

    <!-- Token Status Banner -->
    <div id="tokenBanner" class="card p-5 fade-in" style="display:none;">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div id="tokenStatusIcon" class="w-11 h-11 rounded-xl flex items-center justify-center"></div>
                <div>
                    <div class="flex items-center gap-3">
                        <span id="tokenStatusTitle" class="font-semibold text-sm"></span>
                        <span id="tokenStatusBadge" class="badge"></span>
                    </div>
                    <p id="tokenStatusMessage" class="text-xs text-[var(--text-muted)] mt-1"></p>
                </div>
            </div>
            <button onclick="checkToken()" class="btn btn-ghost text-xs">
                <i class="fa-solid fa-rotate"></i> Kontrol Et
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- LEFT: Token Management -->
        <div class="lg:col-span-2 space-y-6">

            <!-- Current Token -->
            <div class="card p-6 fade-in">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center">
                            <i class="fa-solid fa-key text-indigo-400 text-sm"></i>
                        </div>
                        <div>
                            <h2 class="font-semibold text-sm">Access Token</h2>
                            <p class="text-xs text-[var(--text-muted)]">AmoCRM API erişim anahtarı</p>
                        </div>
                    </div>
                    <button onclick="toggleToken()" class="btn btn-ghost text-xs" id="toggleTokenBtn">
                        <i class="fa-solid fa-eye"></i> Göster
                    </button>
                </div>

                <div id="currentTokenContainer" class="bg-black/20 rounded-xl p-4 mb-4">
                    <div id="currentToken" class="token-display">Yükleniyor...</div>
                </div>

                <div class="flex items-center gap-3 text-xs text-[var(--text-muted)]">
                    <span><i class="fa-regular fa-clock mr-1"></i> Son güncelleme: <span id="tokenUpdatedAt">—</span></span>
                    <span>•</span>
                    <span>Güncelleyen: <span id="tokenUpdatedBy">—</span></span>
                </div>
            </div>

            <!-- Update Token -->
            <div class="card p-6 fade-in">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-9 h-9 rounded-lg bg-emerald-500/10 flex items-center justify-center">
                        <i class="fa-solid fa-arrow-rotate-right text-emerald-400 text-sm"></i>
                    </div>
                    <div>
                        <h2 class="font-semibold text-sm">Token Güncelle</h2>
                        <p class="text-xs text-[var(--text-muted)]">Yeni token yapıştırın — restart gerekmez</p>
                    </div>
                </div>

                <textarea id="newTokenInput" class="input-field mb-4" rows="4"
                          placeholder="eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIs..."></textarea>

                <div class="flex items-center gap-3">
                    <button onclick="updateToken()" class="btn btn-success" id="saveTokenBtn">
                        <i class="fa-solid fa-check"></i> Token'ı Kaydet
                    </button>
                    <button onclick="document.getElementById('newTokenInput').value=''" class="btn btn-ghost text-xs">
                        Temizle
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT: Connection & Quick Settings -->
        <div class="space-y-6">

            <!-- Connection Test -->
            <div class="card p-6 fade-in">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-9 h-9 rounded-lg bg-cyan-500/10 flex items-center justify-center">
                        <i class="fa-solid fa-plug text-cyan-400 text-sm"></i>
                    </div>
                    <h2 class="font-semibold text-sm">Bağlantı Testi</h2>
                </div>

                <div id="connectionResult" class="bg-black/20 rounded-xl p-4 mb-4 min-h-[80px] flex items-center justify-center">
                    <span class="text-xs text-[var(--text-muted)]">Test henüz yapılmadı</span>
                </div>

                <button onclick="testConnection()" class="btn btn-primary w-full justify-center" id="testBtn">
                    <i class="fa-solid fa-bolt"></i> Bağlantıyı Test Et
                </button>
            </div>

            <!-- Quick Settings -->
            <div class="card p-6 fade-in">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-9 h-9 rounded-lg bg-amber-500/10 flex items-center justify-center">
                        <i class="fa-solid fa-sliders text-amber-400 text-sm"></i>
                    </div>
                    <h2 class="font-semibold text-sm">API Ayarları</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="section-label mb-2 block">Base URL</label>
                        <input type="text" id="settingBaseUrl" class="input-field" placeholder="https://xxx.amocrm.ru/api/v4/">
                    </div>
                    <div>
                        <label class="section-label mb-2 block">Page Size</label>
                        <input type="number" id="settingPageSize" class="input-field" value="250" min="1" max="250">
                    </div>
                    <div>
                        <label class="section-label mb-2 block">Request Delay (ms)</label>
                        <input type="number" id="settingRequestDelay" class="input-field" value="200" min="50">
                    </div>
                </div>

                <button onclick="saveSettings()" class="btn btn-primary w-full justify-center mt-5" id="saveSettingsBtn">
                    <i class="fa-solid fa-save"></i> Ayarları Kaydet
                </button>
            </div>

            <!-- Cache Control -->
            <div class="card p-5 fade-in">
                <button onclick="invalidateCache()" class="btn btn-danger w-full justify-center">
                    <i class="fa-solid fa-broom"></i> Cache Temizle
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const API = '';
    let tokenVisible = false;
    let fullToken = '';

    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#1e293b',
        color: '#f1f5f9',
        customClass: { popup: 'rounded-xl' }
    });

    // =====================================================
    // INIT
    // =====================================================
    document.addEventListener('DOMContentLoaded', () => {
        checkToken();
        loadSettings();
    });

    // =====================================================
    // TOKEN STATUS
    // =====================================================
    async function checkToken() {
        const banner = document.getElementById('tokenBanner');
        banner.style.display = 'block';

        try {
            const res = await fetch(`${API}/api/tokens/status`);
            const data = await res.json();

            const icon = document.getElementById('tokenStatusIcon');
            const title = document.getElementById('tokenStatusTitle');
            const badge = document.getElementById('tokenStatusBadge');
            const msg = document.getElementById('tokenStatusMessage');

            const styles = {
                ok:      { bg: 'bg-emerald-500/10', icon: 'fa-check', color: 'text-emerald-400', badgeClass: 'badge-ok' },
                warning: { bg: 'bg-amber-500/10',   icon: 'fa-exclamation', color: 'text-amber-400', badgeClass: 'badge-warning' },
                expired: { bg: 'bg-red-500/10',      icon: 'fa-xmark', color: 'text-red-400', badgeClass: 'badge-error' },
                unknown: { bg: 'bg-slate-500/10',    icon: 'fa-question', color: 'text-slate-400', badgeClass: 'badge-unknown' },
                error:   { bg: 'bg-red-500/10',      icon: 'fa-xmark', color: 'text-red-400', badgeClass: 'badge-error' },
            };

            const s = styles[data.status] || styles.unknown;

            icon.className = `w-11 h-11 rounded-xl flex items-center justify-center ${s.bg}`;
            icon.innerHTML = `<i class="fa-solid ${s.icon} ${s.color}"></i>`;

            title.textContent = data.daysUntilExpiry != null
                ? `Token — ${data.daysUntilExpiry} gün kaldı`
                : `Token — ${data.status}`;

            badge.className = `badge ${s.badgeClass}`;
            badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full ${s.color === 'text-emerald-400' ? 'bg-emerald-400 pulse-dot' : s.color === 'text-amber-400' ? 'bg-amber-400 pulse-dot' : s.color === 'text-red-400' ? 'bg-red-400' : 'bg-slate-400'}"></span>${data.status.toUpperCase()}`;

            msg.textContent = data.message;

            if (data.expiresAt) {
                msg.textContent += ` (${new Date(data.expiresAt).toLocaleDateString('tr-TR')})`;
            }
        } catch (err) {
            console.error(err);
        }
    }

    // =====================================================
    // LOAD SETTINGS & TOKEN
    // =====================================================
    async function loadSettings() {
        try {
            const res = await fetch(`${API}/api/settings`);
            const data = await res.json();

            // AmoCRM settings
            const amoCrm = data.amoCrm || [];
            const find = (key) => amoCrm.find(s => s.key === key);

            const tokenSetting = find('AccessToken');
            if (tokenSetting) {
                fullToken = tokenSetting.value || '';
                document.getElementById('currentToken').textContent = tokenSetting.value || '(Token tanımlı değil)';
                document.getElementById('tokenUpdatedAt').textContent = tokenSetting.updatedAtUtc
                    ? new Date(tokenSetting.updatedAtUtc).toLocaleString('tr-TR')
                    : '—';
                document.getElementById('tokenUpdatedBy').textContent = tokenSetting.updatedBy || '—';
            }

            const baseUrl = find('BaseUrl');
            if (baseUrl) document.getElementById('settingBaseUrl').value = baseUrl.value || '';

            const pageSize = find('PageSize');
            if (pageSize) document.getElementById('settingPageSize').value = pageSize.value || '250';

            const delay = find('RequestDelayMs');
            if (delay) document.getElementById('settingRequestDelay').value = delay.value || '200';
        } catch (err) {
            console.error('Settings yüklenemedi:', err);
        }
    }

    // =====================================================
    // TOGGLE TOKEN VISIBILITY
    // =====================================================
    function toggleToken() {
        tokenVisible = !tokenVisible;
        const el = document.getElementById('currentToken');
        const btn = document.getElementById('toggleTokenBtn');

        if (tokenVisible) {
            el.classList.add('expanded');
            btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i> Gizle';
        } else {
            el.classList.remove('expanded');
            btn.innerHTML = '<i class="fa-solid fa-eye"></i> Göster';
        }
    }

    // =====================================================
    // UPDATE TOKEN
    // =====================================================
    async function updateToken() {
        const token = document.getElementById('newTokenInput').value.trim();
        if (!token) {
            Toast.fire({ icon: 'warning', title: 'Token boş olamaz!' });
            return;
        }

        const btn = document.getElementById('saveTokenBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Kaydediliyor...';

        try {
            const res = await fetch(`${API}/api/tokens/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, updatedBy: 'Admin' })
            });

            const data = await res.json();

            if (res.ok) {
                Toast.fire({ icon: 'success', title: 'Token güncellendi!' });
                document.getElementById('newTokenInput').value = '';
                checkToken();
                loadSettings();
            } else {
                Toast.fire({ icon: 'error', title: data.message || 'Hata oluştu' });
            }
        } catch (err) {
            Toast.fire({ icon: 'error', title: 'Bağlantı hatası!' });
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Token\'ı Kaydet';
        }
    }

    // =====================================================
    // TEST CONNECTION
    // =====================================================
    async function testConnection() {
        const container = document.getElementById('connectionResult');
        const btn = document.getElementById('testBtn');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Test ediliyor...';
        container.innerHTML = '<span class="spinner" style="border-top-color: var(--accent);"></span>';

        try {
            const res = await fetch(`${API}/api/settings/test-connection`, { method: 'POST' });
            const data = await res.json();

            if (data.success) {
                container.innerHTML = `
                <div class="text-center">
                    <div class="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid fa-check text-emerald-400"></i>
                    </div>
                    <p class="text-sm font-medium text-emerald-400">Bağlantı Başarılı</p>
                    <p class="text-xs text-[var(--text-muted)] mt-1">HTTP ${data.statusCode}</p>
                </div>`;
            } else {
                container.innerHTML = `
                <div class="text-center">
                    <div class="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid fa-xmark text-red-400"></i>
                    </div>
                    <p class="text-sm font-medium text-red-400">Bağlantı Başarısız</p>
                    <p class="text-xs text-[var(--text-muted)] mt-1">${data.message}</p>
                </div>`;
            }
        } catch (err) {
            container.innerHTML = `
            <div class="text-center">
                <i class="fa-solid fa-triangle-exclamation text-red-400 mb-2"></i>
                <p class="text-xs text-red-400">API'ye erişilemedi</p>
            </div>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Bağlantıyı Test Et';
        }
    }

    // =====================================================
    // SAVE SETTINGS
    // =====================================================
    async function saveSettings() {
        const btn = document.getElementById('saveSettingsBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Kaydediliyor...';

        const settings = [
            { category: 'AmoCrm', key: 'BaseUrl', value: document.getElementById('settingBaseUrl').value },
            { category: 'AmoCrm', key: 'PageSize', value: document.getElementById('settingPageSize').value },
            { category: 'AmoCrm', key: 'RequestDelayMs', value: document.getElementById('settingRequestDelay').value },
        ];

        try {
            let success = true;
            for (const s of settings) {
                const res = await fetch(`${API}/api/settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...s, updatedBy: 'Admin' })
                });
                if (!res.ok) success = false;
            }

            if (success) {
                Toast.fire({ icon: 'success', title: 'Ayarlar kaydedildi!' });
            } else {
                Toast.fire({ icon: 'error', title: 'Bazı ayarlar kaydedilemedi' });
            }
        } catch (err) {
            Toast.fire({ icon: 'error', title: 'Bağlantı hatası!' });
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-save"></i> Ayarları Kaydet';
        }
    }

    // =====================================================
    // CACHE INVALIDATE
    // =====================================================
    async function invalidateCache() {
        try {
            await fetch(`${API}/api/settings/invalidate-cache`, { method: 'POST' });
            Toast.fire({ icon: 'success', title: 'Cache temizlendi!' });
        } catch {
            Toast.fire({ icon: 'error', title: 'Hata!' });
        }
    }
</script>

</body>
</html>
