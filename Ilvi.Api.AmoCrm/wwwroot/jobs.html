<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilvi AmoCRM — Görev Yönetimi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2235;
            --border: #1e293b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: border-color 0.2s;
        }

        .card:hover { border-color: rgba(99, 102, 241, 0.3); }

        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 10px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            width: 100%;
            transition: all 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #5558e6; box-shadow: 0 4px 20px var(--accent-glow); }

        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #0d9668; }

        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        .btn-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .btn-warning:hover { background: rgba(245, 158, 11, 0.2); }

        .btn-sm { padding: 5px 10px; font-size: 11px; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-installed { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-available { background: rgba(100, 116, 139, 0.1); color: var(--text-muted); border: 1px solid rgba(100, 116, 139, 0.2); }
        .badge-succeeded { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-failed { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-processing { background: rgba(99, 102, 241, 0.1); color: var(--accent); }

        .job-row {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1fr 1fr 0.8fr 1.4fr;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            gap: 12px;
        }

        .job-row:hover { background: var(--bg-card-hover); }

        .job-row:last-child { border-bottom: none; }

        .job-header {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1fr 1fr 0.8fr 1.4fr;
            padding: 10px 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover { color: var(--text-primary); background: var(--bg-card-hover); }
        .nav-link.active { color: var(--accent); background: var(--accent-glow); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .cron-input { width: 140px; text-align: center; }

        /* Preset dropdown */
        .preset-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            z-index: 50;
            min-width: 220px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .preset-menu.show { display: block; }

        .preset-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.15s;
        }

        .preset-item:hover {
            background: var(--accent-glow);
            color: var(--text-primary);
        }

        .preset-item code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            margin-left: 6px;
        }
    </style>
</head>

<body>

<!-- Navigation -->
<nav class="sticky top-0 z-50 border-b border-[var(--border)]" style="background: rgba(10, 14, 26, 0.9); backdrop-filter: blur(20px);">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-clock text-white text-sm"></i>
            </div>
            <span class="font-semibold text-sm">Ilvi AmoCRM</span>
            <span class="text-[var(--text-muted)] text-xs">/</span>
            <span class="text-[var(--text-secondary)] text-sm">Görev Yönetimi</span>
        </div>
        <div class="flex items-center gap-2">
            <a href="/config.html" class="nav-link"><i class="fa-solid fa-gear mr-1.5"></i>Ayarlar</a>
            <a href="/swagger" class="nav-link"><i class="fa-solid fa-book mr-1.5"></i>API</a>
            <a href="/hangfire" class="nav-link"><i class="fa-solid fa-chart-bar mr-1.5"></i>Hangfire</a>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8 relative z-10 space-y-6">

    <!-- Stats Bar -->
    <div class="grid grid-cols-4 gap-4 fade-in">
        <div class="card p-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-indigo-500/10 flex items-center justify-center">
                    <i class="fa-solid fa-list-check text-indigo-400 text-sm"></i>
                </div>
                <div>
                    <div class="text-lg font-bold" id="statTotal">—</div>
                    <div class="text-xs text-[var(--text-muted)]">Toplam Görev</div>
                </div>
            </div>
        </div>
        <div class="card p-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-emerald-500/10 flex items-center justify-center">
                    <i class="fa-solid fa-check text-emerald-400 text-sm"></i>
                </div>
                <div>
                    <div class="text-lg font-bold text-emerald-400" id="statSucceeded">—</div>
                    <div class="text-xs text-[var(--text-muted)]">Başarılı</div>
                </div>
            </div>
        </div>
        <div class="card p-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-red-500/10 flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-red-400 text-sm"></i>
                </div>
                <div>
                    <div class="text-lg font-bold text-red-400" id="statFailed">—</div>
                    <div class="text-xs text-[var(--text-muted)]">Başarısız</div>
                </div>
            </div>
        </div>
        <div class="card p-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-amber-500/10 flex items-center justify-center">
                    <i class="fa-solid fa-server text-amber-400 text-sm"></i>
                </div>
                <div>
                    <div class="text-lg font-bold text-amber-400" id="statServers">—</div>
                    <div class="text-xs text-[var(--text-muted)]">Aktif Sunucu</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-between fade-in">
        <div class="flex items-center gap-3">
            <button onclick="setupAll()" class="btn btn-primary">
                <i class="fa-solid fa-download"></i> Tümünü Kur
            </button>
            <button onclick="applyNightSchedule()" class="btn btn-success">
                <i class="fa-solid fa-moon"></i> Gece Planını Uygula
            </button>
            <button onclick="triggerAll()" class="btn btn-warning">
                <i class="fa-solid fa-bolt"></i> Tümünü Tetikle
            </button>
        </div>
        <button onclick="loadJobs()" class="btn btn-ghost">
            <i class="fa-solid fa-rotate"></i> Yenile
        </button>
    </div>

    <!-- Jobs Table -->
    <div class="card fade-in overflow-hidden">
        <div class="job-header">
            <span>Görev</span>
            <span>Cron</span>
            <span>Son Çalışma</span>
            <span>Sonraki</span>
            <span>Durum</span>
            <span class="text-right">İşlemler</span>
        </div>
        <div id="jobsContainer">
            <div class="flex items-center justify-center py-12">
                <span class="spinner" style="border-top-color: var(--accent);"></span>
                <span class="text-sm text-[var(--text-muted)] ml-3">Yükleniyor...</span>
            </div>
        </div>
    </div>

    <!-- Available but not installed -->
    <div id="availableSection" class="card fade-in overflow-hidden" style="display:none;">
        <div class="p-4 border-b border-[var(--border)]">
            <h3 class="font-semibold text-sm flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-[var(--text-muted)]"></i>
                Kurulmamış Görevler
            </h3>
        </div>
        <div id="availableContainer"></div>
    </div>
</div>

<script>
const API = '';

// =====================================================
// NIGHT SCHEDULE PRESET
// =====================================================
const NIGHT_SCHEDULE = {
    'sync-users':          '0 0,2,4,6,8 * * *',
    'sync-task-types':     '2 0,2,4,6,8 * * *',
    'sync-pipelines':      '4 0,2,4,6,8 * * *',
    'sync-tasks-full':     '10 0,2,4,6,8 * * *',
    'sync-contacts-full':  '30 0,2,4,6,8 * * *',
    'sync-leads-full':     '45 0,3,6 * * *',
    'sync-events':         '0 1,4,7 * * *',
    'sync-messages':       '30 1,4,7 * * *',
};

// =====================================================
// CRON PRESETS
// =====================================================
const CRON_PRESETS = [
    { label: 'Her 2 saatte (00-08)', cron: '0 0,2,4,6,8 * * *' },
    { label: 'Her 3 saatte (00-08)', cron: '0 0,3,6 * * *' },
    { label: 'Gece 02:00', cron: '0 2 * * *' },
    { label: 'Gece 03:00', cron: '0 3 * * *' },
    { label: 'Her saat', cron: '0 * * * *' },
    { label: 'Her 30 dk', cron: '*/30 * * * *' },
    { label: 'Her 15 dk', cron: '*/15 * * * *' },
    { label: 'Günde 1 (05:00)', cron: '0 5 * * *' },
];

const Toast = Swal.mixin({
    toast: true, position: 'top-end', showConfirmButton: false,
    timer: 3000, timerProgressBar: true,
    background: '#1e293b', color: '#f1f5f9',
    customClass: { popup: 'rounded-xl' }
});

// =====================================================
// INIT
// =====================================================
document.addEventListener('DOMContentLoaded', () => {
    loadJobs();
    loadStats();
});

// Close preset menus on outside click
document.addEventListener('click', (e) => {
    if (!e.target.closest('.preset-trigger') && !e.target.closest('.preset-menu')) {
        document.querySelectorAll('.preset-menu').forEach(m => m.classList.remove('show'));
    }
});

// =====================================================
// LOAD JOBS
// =====================================================
async function loadJobs() {
    try {
        const [installedRes, availableRes] = await Promise.all([
            fetch(`${API}/api/jobs`),
            fetch(`${API}/api/jobs/available`)
        ]);

        const installed = await installedRes.json();
        const available = await availableRes.json();

        const container = document.getElementById('jobsContainer');
        const availSection = document.getElementById('availableSection');
        const availContainer = document.getElementById('availableContainer');

        // Installed jobs
        if (installed.jobs && installed.jobs.length > 0) {
            container.innerHTML = installed.jobs.map(job => `
                <div class="job-row">
                    <div>
                        <div class="font-medium text-sm">${job.displayName || job.id}</div>
                        <div class="text-xs text-[var(--text-muted)]">${job.description || job.id}</div>
                    </div>
                    <div class="relative">
                        <div class="flex items-center gap-1">
                            <input type="text" class="input-field cron-input" id="cron-${job.id}" value="${job.cron}" />
                            <button onclick="togglePreset('${job.id}')" class="btn btn-ghost btn-sm preset-trigger" title="Hazır zamanlamalar">
                                <i class="fa-solid fa-chevron-down" style="font-size:9px;"></i>
                            </button>
                        </div>
                        <div class="preset-menu" id="preset-${job.id}">
                            ${CRON_PRESETS.map(p => `
                                <div class="preset-item" onclick="selectPreset('${job.id}', '${p.cron}')">
                                    ${p.label} <code>${p.cron}</code>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="text-xs text-[var(--text-secondary)]">${job.lastExecution || '—'}</div>
                    <div class="text-xs text-[var(--text-secondary)]">${job.nextExecution || '—'}</div>
                    <div>${getStatusBadge(job.lastJobState)}</div>
                    <div class="flex items-center gap-2 justify-end">
                        <button onclick="updateCron('${job.id}')" class="btn btn-ghost btn-sm" title="Cron Kaydet">
                            <i class="fa-solid fa-save"></i>
                        </button>
                        <button onclick="triggerJob('${job.id}')" class="btn btn-primary btn-sm" title="Şimdi Çalıştır">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="runOnce('${job.id}')" class="btn btn-warning btn-sm" title="Tek Seferlik">
                            <i class="fa-solid fa-bolt"></i>
                        </button>
                        <button onclick="removeJob('${job.id}')" class="btn btn-danger btn-sm" title="Sil">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 text-[var(--text-muted)]">
                    <i class="fa-solid fa-inbox text-3xl mb-3"></i>
                    <p class="text-sm">Kurulu görev yok</p>
                    <p class="text-xs mt-1">Tümünü Kur veya Gece Planını Uygula butonunu kullanın</p>
                </div>`;
        }

        // Available but not installed
        const notInstalled = available.filter(a => !a.isInstalled);
        if (notInstalled.length > 0) {
            availSection.style.display = 'block';
            availContainer.innerHTML = notInstalled.map(job => `
                <div class="job-row" style="grid-template-columns: 2fr 1fr 1fr;">
                    <div>
                        <div class="font-medium text-sm">${job.displayName}</div>
                        <div class="text-xs text-[var(--text-muted)]">${job.description}</div>
                    </div>
                    <div class="text-xs font-mono text-[var(--text-muted)]">${job.defaultCron}</div>
                    <div class="text-right">
                        <button onclick="setupJob('${job.id}')" class="btn btn-primary btn-sm">
                            <i class="fa-solid fa-plus"></i> Kur
                        </button>
                    </div>
                </div>
            `).join('');
        } else {
            availSection.style.display = 'none';
        }
    } catch (err) {
        console.error(err);
        Toast.fire({ icon: 'error', title: 'Görevler yüklenemedi!' });
    }
}

// =====================================================
// LOAD STATS
// =====================================================
async function loadStats() {
    try {
        const [summaryRes, serverRes] = await Promise.all([
            fetch(`${API}/api/jobs/summary`),
            fetch(`${API}/api/jobs/servers`)
        ]);
        const summary = await summaryRes.json();
        const servers = await serverRes.json();

        document.getElementById('statTotal').textContent = summary.total;
        document.getElementById('statSucceeded').textContent = summary.succeeded;
        document.getElementById('statFailed').textContent = summary.failed;
        document.getElementById('statServers').textContent = servers.count;
    } catch (err) {
        console.error(err);
    }
}

// =====================================================
// STATUS BADGE
// =====================================================
function getStatusBadge(state) {
    if (!state) return '<span class="badge badge-available">Bekleniyor</span>';
    const map = {
        'Succeeded': ['badge-succeeded', 'fa-check', 'Başarılı'],
        'Failed':    ['badge-failed', 'fa-xmark', 'Hatalı'],
        'Processing': ['badge-processing', 'fa-spinner fa-spin', 'Çalışıyor'],
    };
    const [cls, icon, label] = map[state] || ['badge-available', 'fa-question', state];
    return `<span class="badge ${cls}"><i class="fa-solid ${icon}" style="font-size:9px;"></i> ${label}</span>`;
}

// =====================================================
// PRESET MENU
// =====================================================
function togglePreset(jobId) {
    const menu = document.getElementById(`preset-${jobId}`);
    document.querySelectorAll('.preset-menu').forEach(m => {
        if (m !== menu) m.classList.remove('show');
    });
    menu.classList.toggle('show');
}

function selectPreset(jobId, cron) {
    document.getElementById(`cron-${jobId}`).value = cron;
    document.getElementById(`preset-${jobId}`).classList.remove('show');
}

// =====================================================
// ACTIONS
// =====================================================
async function updateCron(jobId) {
    const cron = document.getElementById(`cron-${jobId}`).value.trim();
    try {
        const res = await fetch(`${API}/api/jobs/update-cron`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: jobId, cron })
        });
        const data = await res.json();
        Toast.fire({ icon: res.ok ? 'success' : 'error', title: data.message });
        if (res.ok) loadJobs();
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

async function triggerJob(jobId) {
    try {
        const res = await fetch(`${API}/api/jobs/trigger/${jobId}`, { method: 'POST' });
        const data = await res.json();
        Toast.fire({ icon: 'success', title: data.message });
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

async function runOnce(jobId) {
    try {
        const res = await fetch(`${API}/api/run/${jobId}`, { method: 'POST' });
        const data = await res.json();
        Toast.fire({ icon: res.ok ? 'success' : 'error', title: data.message });
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

async function removeJob(jobId) {
    const result = await Swal.fire({
        title: 'Emin misiniz?',
        text: `"${jobId}" görevi silinecek.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sil',
        cancelButtonText: 'İptal',
        background: '#1e293b',
        color: '#f1f5f9',
        confirmButtonColor: '#ef4444'
    });
    if (!result.isConfirmed) return;

    try {
        const res = await fetch(`${API}/api/jobs/${jobId}`, { method: 'DELETE' });
        const data = await res.json();
        Toast.fire({ icon: 'success', title: data.message });
        loadJobs();
        loadStats();
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

async function setupJob(jobId) {
    try {
        const res = await fetch(`${API}/api/jobs/setup/${jobId}`, { method: 'POST' });
        const data = await res.json();
        Toast.fire({ icon: 'success', title: data.message });
        loadJobs();
        loadStats();
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

async function setupAll() {
    try {
        const res = await fetch(`${API}/api/jobs/setup-all`, { method: 'POST' });
        const data = await res.json();
        Toast.fire({ icon: 'success', title: data.message });
        loadJobs();
        loadStats();
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

async function triggerAll() {
    try {
        const res = await fetch(`${API}/api/jobs/trigger-all`, { method: 'POST' });
        const data = await res.json();
        Toast.fire({ icon: 'success', title: data.message });
    } catch { Toast.fire({ icon: 'error', title: 'Hata!' }); }
}

// =====================================================
// NIGHT SCHEDULE
// =====================================================
async function applyNightSchedule() {
    const result = await Swal.fire({
        title: 'Gece Planını Uygula',
        html: `
            <div style="text-align:left; font-size:13px; color:#94a3b8; line-height:1.8;">
                <div style="font-family:monospace; font-size:11px;">
                    ${Object.entries(NIGHT_SCHEDULE).map(([id, cron]) =>
                        `<div><span style="color:#6366f1;">${cron.padEnd(24)}</span> ${id}</div>`
                    ).join('')}
                </div>
                <div style="margin-top:12px; padding:10px; background:rgba(99,102,241,0.1); border-radius:8px; font-size:12px; color:#a5b4fc;">
                    <i class="fa-solid fa-info-circle" style="margin-right:4px;"></i>
                    Tüm görevler gece 00:00-08:00 arasında 3-5 kez çalışacak.
                </div>
            </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'Uygula',
        cancelButtonText: 'İptal',
        background: '#1e293b',
        color: '#f1f5f9',
        confirmButtonColor: '#10b981',
        width: 500
    });

    if (!result.isConfirmed) return;

    let success = 0;
    let fail = 0;

    for (const [id, cron] of Object.entries(NIGHT_SCHEDULE)) {
        try {
            const res = await fetch(`${API}/api/jobs/setup-with-cron`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, cron })
            });
            if (res.ok) success++; else fail++;
        } catch { fail++; }
    }

    Toast.fire({
        icon: fail === 0 ? 'success' : 'warning',
        title: `${success} görev kuruldu${fail > 0 ? `, ${fail} hata` : ''}`
    });

    loadJobs();
    loadStats();
}
</script>

</body>
</html>
